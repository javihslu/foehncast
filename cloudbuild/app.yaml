# Cloud Build config for the FoehnCast app image.
#
# Trigger: Cloud Build trigger fires on push to main when src/ or
# containers/app/ changes (via Developer Connect).
#
# Manual submission (for testing):
#   gcloud builds submit . \
#     --config=cloudbuild/app.yaml \
#     --substitutions=_IMAGE_REPOSITORY=REGION-docker.pkg.dev/PROJECT/REPO/foehncast-app,_COMMIT_SHA=$(git rev-parse HEAD)

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        tags=(-t "${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}")
        if [[ -n "${_FLOATING_TAG}" ]]; then
          tags+=(-t "${_FLOATING_TAG}")
        fi

        docker build \
          --platform linux/amd64 \
          -f containers/app/Dockerfile \
          "${tags[@]}" \
          .

        docker push "${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}"

        if [[ -n "${_FLOATING_TAG}" ]]; then
          docker push "${_FLOATING_TAG}"
        fi

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}
      - --region=${_REGION}
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_INFERENCE_JOB}
      - --image=${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}
      - --region=${_REGION}
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_FEATURE_JOB}
      - --image=${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}
      - --region=${_REGION}
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_TRAINING_JOB}
      - --image=${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}
      - --region=${_REGION}
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ${_DRIFT_JOB}
      - --image=${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}
      - --region=${_REGION}
      - --quiet

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_IMAGE_REPOSITORY}:sha-${_COMMIT_SHA}"

substitutions:
  _IMAGE_REPOSITORY: europe-west6-docker.pkg.dev/${PROJECT_ID}/foehncast-docker/foehncast-app
  _COMMIT_SHA: ${SHORT_SHA}
  _FLOATING_TAG: ""
  _REGION: europe-west6
  _SERVICE_NAME: foehncast-serve
  _FEATURE_JOB: foehncast-feature-pipeline
  _TRAINING_JOB: foehncast-training-pipeline
  _INFERENCE_JOB: foehncast-inference-pipeline
  _DRIFT_JOB: foehncast-drift-detection
