services:
  app:
    container_name: app
    build:
      context: ../..
      dockerfile: containers/app/Dockerfile
    image: ${FOEHNCAST_APP_IMAGE:-foehncast-app:local}
    command: ["/usr/local/bin/start-app.sh"]
    depends_on:
      model-registry:
        condition: service_started
    env_file:
      - path: ../../.env.example
        required: false
      - path: ../../.env
        required: false
    environment:
      MLFLOW_TRACKING_URI: http://model-registry:5001
      GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID:-}
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
    ports:
      - ${APP_BIND_HOST:-127.0.0.1}:8000:8000
    networks:
      - production
