x-airflow-runtime-env: &airflow-runtime-env
  AIRFLOW_HOME: /workspace/airflow
  AIRFLOW__CORE__AUTH_MANAGER: ${AIRFLOW__CORE__AUTH_MANAGER:-airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-false}
  AIRFLOW__CORE__DAGS_FOLDER: /workspace/dags
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS:-true}
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS:-admin:admin}
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: ${AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE:-/workspace/airflow/simple_auth_manager_passwords.json}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:-postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow}
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN_ASYNC:-postgresql+asyncpg://airflow:airflow@airflow-postgres/airflow}
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-foehncast-local-jwt-secret}
  MLFLOW_TRACKING_URI: http://model-registry:5001
  GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID:-}
  FOEHNCAST_STATSD_HOST: statsd
  FOEHNCAST_STATSD_PORT: 8125
  FOEHNCAST_STATSD_PREFIX: ${FOEHNCAST_STATSD_PREFIX:-drift_metrics}
  PYTHONPATH: /workspace/src

x-airflow-common: &airflow-common
  build:
    context: ../..
    dockerfile: containers/airflow/Dockerfile
  image: ${FOEHNCAST_AIRFLOW_IMAGE:-foehncast-airflow:local}
  working_dir: /workspace
  depends_on:
    airflow-postgres:
      condition: service_healthy
    model-registry:
      condition: service_started
  env_file:
    - path: ../../.env.example
      required: false
    - path: ../../.env
      required: false
  environment:
    <<: *airflow-runtime-env
  volumes:
    - ../../:/workspace
  networks:
    - development

services:
  airflow-postgres:
    image: postgres:18
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${AIRFLOW_POSTGRES_USER:-airflow} -d ${AIRFLOW_POSTGRES_DB:-airflow}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - airflow-postgres-db:/var/lib/postgresql/data
    networks:
      - development

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    environment:
      <<: *airflow-runtime-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_PASSWORD_FILE: ${AIRFLOW_ADMIN_PASSWORD_FILE:-}
    command: ["/usr/local/bin/init-airflow.sh"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /workspace/airflow/.init-complete"]
      interval: 2s
      timeout: 2s
      retries: 30

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_healthy
    command: ["/usr/local/bin/start-airflow-webserver.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/api/v2/version')",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    ports:
      - ${AIRFLOW_BIND_HOST:-127.0.0.1}:8080:8080

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_healthy
    command: ["/usr/local/bin/start-airflow-dag-processor.sh"]
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "DagProcessorJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_healthy
    command: ["/usr/local/bin/start-airflow-scheduler.sh"]
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    depends_on:
      airflow-init:
        condition: service_healthy
    command: ["/usr/local/bin/start-airflow-triggerer.sh"]
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "TriggererJob", "--local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  airflow-postgres-db:
