services:
  model-registry:
    container_name: model-registry
    build: .
    image: ${FOEHNCAST_MLFLOW_IMAGE:-foehncast-mlflow:local}
    command: ["/usr/local/bin/start-model-registry.sh"]
    hostname: model-registry
    ports:
      - ${MLFLOW_BIND_HOST:-127.0.0.1}:5001:5001
    environment:
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5001
      - MLFLOW_ARTIFACT_DESTINATION=${MLFLOW_ARTIFACT_DESTINATION:-file:///mlartifacts}
      - MLFLOW_BACKEND_STORE_URI=sqlite:///metadata/metadata.sqlite
      # S3 credentials for the artifact proxy when the destination is MinIO.
      - AWS_ACCESS_KEY_ID=${OBJECTSTORE_ACCESS_KEY:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${OBJECTSTORE_SECRET_KEY:-minioadmin123}
      - MLFLOW_S3_ENDPOINT_URL=${MLFLOW_S3_ENDPOINT_URL:-http://objectstore:9000}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-}
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID:-}
    volumes:
      - mlflow_metadata:/metadata
      - mlflow_artifacts:/mlartifacts
    networks:
      - development
      - production

volumes:
  mlflow_artifacts:
  mlflow_metadata:
