services:
  model-registry:
    container_name: model-registry
    build: .
    image: ${FOEHNCAST_MLFLOW_IMAGE:-foehncast-mlflow:local}
    command: ["/usr/local/bin/start-model-registry.sh"]
    hostname: model-registry
    ports:
      - ${MLFLOW_BIND_HOST:-127.0.0.1}:5001:5001
    environment:
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5001
      - MLFLOW_ARTIFACT_DESTINATION=${MLFLOW_ARTIFACT_DESTINATION:-file:///mlartifacts}
      - MLFLOW_BACKEND_STORE_URI=sqlite:///metadata/metadata.sqlite
    volumes:
      - mlflow_metadata:/metadata
      - mlflow_artifacts:/mlartifacts
    networks:
      - development
      - production

volumes:
  mlflow_artifacts:
  mlflow_metadata:
