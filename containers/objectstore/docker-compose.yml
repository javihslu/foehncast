services:
  objectstore:
    container_name: objectstore
    image: minio/minio
    command: server --address "0.0.0.0:9000" --console-address "0.0.0.0:9001" /data
    hostname: objectstore
    ports:
      - 127.0.0.1:9000:9000
      - 127.0.0.1:9001:9001
    environment:
      - MINIO_ROOT_USER=${MINIO_ADMIN}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET}
    volumes:
      - objectstore_data:/data
    networks:
      - development
      - production

volumes:
  objectstore_data:
