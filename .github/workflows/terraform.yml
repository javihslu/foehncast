name: Terraform

on:
  push:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/terraform.yml
  workflow_dispatch:
    inputs:
      command:
        description: Terraform command to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
          - cleanup
      destroy_confirmation:
        description:
          For destroy only, type the resolved GCP project id to confirm
          remote teardown
        required: false
        type: string
      cleanup_confirmation:
        description:
          For cleanup only, type the resolved GCP project id to confirm
          remote cleanup
        required: false
        type: string
      cleanup_clear_github_actions:
        description: Clear the synced GitHub Actions repository variables during cleanup
        required: false
        default: false
        type: boolean
      cleanup_delete_state_bucket:
        description: Delete the Terraform remote state bucket during cleanup
        required: false
        default: false
        type: boolean
      project_id:
        description: GCP project id
        required: false
        type: string
      region:
        description: GCP region
        required: false
        type: string
      artifact_bucket_name:
        description: GCS bucket for artifacts
        required: false
        type: string
      artifact_registry_repository_id:
        description: Artifact Registry repository id
        required: false
        type: string
      bigquery_dataset_id:
        description: BigQuery dataset id
        required: false
        type: string
      bigquery_location:
        description: BigQuery location
        required: false
        type: string
      bigquery_feature_table_id:
        description: BigQuery feature table id
        required: false
        type: string
      feast_online_store_location:
        description: Feast online store location (leave blank to use repo vars)
        required: false
        type: string
      feast_online_store_database_name:
        description: Feast online store database name (leave blank to use repo vars)
        required: false
        type: string
      provision_cloud_run_service:
        description: Provision Cloud Run app service (`true` or `false`; leave blank to use repo vars)
        required: false
        type: string
      mlflow_tracking_uri:
        description: Reachable MLflow URL for the Cloud Run app (leave blank to use repo vars)
        required: false
        type: string
      cloud_run_service_name:
        description: Cloud Run service name (leave blank to use repo vars)
        required: false
        type: string
      cloud_run_allow_unauthenticated:
        description: Allow unauthenticated Cloud Run access (`true` or `false`; leave blank to use repo vars)
        required: false
        type: string
      provision_cloud_composer_environment:
        description: Provision the Cloud Composer environment (`true` or `false`; leave blank to use repo vars)
        required: false
        type: string
      cloud_composer_environment_name:
        description: Cloud Composer environment name (leave blank to use repo vars)
        required: false
        type: string
      provision_online_compose_host:
        description: Provision the full online compose host (`true` or `false`; leave blank to use repo vars)
        required: false
        type: string
      online_compose_host_name:
        description: Compute Engine host name (leave blank to use repo vars)
        required: false
        type: string
      online_compose_host_zone:
        description: Compute Engine zone (leave blank to use repo vars)
        required: false
        type: string
      online_compose_machine_type:
        description: Compute Engine machine type (leave blank to use repo vars)
        required: false
        type: string
      online_compose_disk_size_gb:
        description: Boot disk size in GB (leave blank to use repo vars)
        required: false
        type: string
permissions:
  contents: read

jobs:
  validate:
    if:
      ${{ github.actor == github.repository_owner && github.triggering_actor ==
      github.repository_owner }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: hashicorp/setup-terraform@v4.0.1
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform fmt -check
      - run: terraform -chdir=terraform validate

  remote:
    if:
      ${{ github.actor == github.repository_owner && github.triggering_actor ==
      github.repository_owner && (github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: hashicorp/setup-terraform@v4.0.1

      - name: Load repository configuration
        id: repo_config
        uses: ./.github/actions/load-gcp-repo-config
        with:
          repo-vars-json: ${{ toJson(vars) }}

      - name: Resolve execution flags
        id: flags
        env:
          EVENT_NAME: ${{ github.event_name }}
          PROJECT_ID: ${{ steps.repo_config.outputs.project_id }}
          WORKLOAD_IDENTITY_PROVIDER: ${{ steps.repo_config.outputs.workload_identity_provider }}
          SERVICE_ACCOUNT_EMAIL: ${{ steps.repo_config.outputs.service_account_email }}
        run: |
          set -euo pipefail

          command='${{ inputs.command }}'
          if [[ "$EVENT_NAME" == 'push' ]]; then
            command='apply'
          elif [[ -z "$command" ]]; then
            command='plan'
          fi

          bootstrap_ready=false
          if [[ -n "$PROJECT_ID" && -n "$WORKLOAD_IDENTITY_PROVIDER" && -n "$SERVICE_ACCOUNT_EMAIL" ]]; then
            bootstrap_ready=true
          fi

          {
            echo "command=$command"
            echo "bootstrap_ready=$bootstrap_ready"
          } >> "$GITHUB_OUTPUT"

      - name: Explain skipped automatic apply before bootstrap
        if: ${{ github.event_name == 'push' && steps.flags.outputs.bootstrap_ready != 'true' }}
        run: |
          {
            echo "## Terraform apply skipped"
            echo
            echo "Automatic remote apply is not active yet because the shared cloud bootstrap has not populated the required repository variables."
            echo "Run the one-time maintainer bootstrap from Google Cloud Shell, then pushes to main can drive the shared cloud path automatically."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail manual run before bootstrap
        if: ${{ github.event_name == 'workflow_dispatch' && steps.flags.outputs.bootstrap_ready != 'true' }}
        run: |
          set -euo pipefail
          echo 'Remote Terraform is not bootstrapped yet. Run the one-time maintainer bootstrap from Google Cloud Shell first.' >&2
          exit 1

      - name: Validate OIDC configuration
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' }}
        env:
          WORKLOAD_IDENTITY_PROVIDER: ${{ steps.repo_config.outputs.workload_identity_provider }}
          SERVICE_ACCOUNT_EMAIL: ${{ steps.repo_config.outputs.service_account_email }}
        run: |
          set -euo pipefail

          if [[ -z "$WORKLOAD_IDENTITY_PROVIDER" || -z "$SERVICE_ACCOUNT_EMAIL" ]]; then
            echo 'Configure GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT_EMAIL before running remote Terraform.' >&2
            exit 1
          fi

      - uses: google-github-actions/auth@v3
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' }}
        with:
          workload_identity_provider: ${{ steps.repo_config.outputs.workload_identity_provider }}
          service_account: ${{ steps.repo_config.outputs.service_account_email }}

      - uses: google-github-actions/setup-gcloud@v3
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' }}

      - name: Resolve Terraform inputs
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' }}
        env:
          REPO_GCP_PROJECT_ID: ${{ steps.repo_config.outputs.project_id }}
          REPO_GCP_LOCATION: ${{ steps.repo_config.outputs.location }}
          REPO_GCP_ARTIFACT_BUCKET_NAME: ${{ steps.repo_config.outputs.artifact_bucket_name }}
          REPO_GCP_TERRAFORM_STATE_BUCKET: ${{ steps.repo_config.outputs.state_bucket }}
          REPO_GCP_TERRAFORM_STATE_PREFIX: ${{ steps.repo_config.outputs.state_prefix }}
          REPO_GCP_ARTIFACT_REPOSITORY: ${{ steps.repo_config.outputs.artifact_repository }}
          REPO_GCP_BIGQUERY_DATASET: ${{ steps.repo_config.outputs.bigquery_dataset }}
          REPO_GCP_BIGQUERY_LOCATION: ${{ steps.repo_config.outputs.bigquery_location }}
          REPO_GCP_BIGQUERY_TABLE: ${{ steps.repo_config.outputs.bigquery_table }}
          REPO_GCP_FEAST_ONLINE_STORE_LOCATION: ${{ steps.repo_config.outputs.feast_online_store_location }}
          REPO_GCP_FEAST_ONLINE_STORE_DATABASE_NAME: ${{ steps.repo_config.outputs.feast_online_store_database_name }}
          REPO_GCP_PROVISION_CLOUD_RUN_SERVICE: ${{ steps.repo_config.outputs.provision_cloud_run_service }}
          REPO_GCP_CLOUD_RUN_SERVICE_NAME: ${{ steps.repo_config.outputs.cloud_run_service_name }}
          REPO_GCP_CLOUD_RUN_CONTAINER_PORT: ${{ steps.repo_config.outputs.cloud_run_container_port }}
          REPO_GCP_CLOUD_RUN_ALLOW_UNAUTHENTICATED: ${{ steps.repo_config.outputs.cloud_run_allow_unauthenticated }}
          REPO_GCP_CLOUD_RUN_MIN_INSTANCE_COUNT: ${{ steps.repo_config.outputs.cloud_run_min_instance_count }}
          REPO_GCP_CLOUD_RUN_MAX_INSTANCE_COUNT: ${{ steps.repo_config.outputs.cloud_run_max_instance_count }}
          REPO_GCP_CLOUD_RUN_CPU: ${{ steps.repo_config.outputs.cloud_run_cpu }}
          REPO_GCP_CLOUD_RUN_MEMORY: ${{ steps.repo_config.outputs.cloud_run_memory }}
          REPO_GCP_MLFLOW_TRACKING_URI: ${{ steps.repo_config.outputs.mlflow_tracking_uri }}
          REPO_GCP_PROVISION_CLOUD_COMPOSER_ENVIRONMENT: ${{ steps.repo_config.outputs.provision_cloud_composer_environment }}
          REPO_GCP_CLOUD_COMPOSER_ENVIRONMENT_NAME: ${{ steps.repo_config.outputs.cloud_composer_environment_name }}
          REPO_GCP_PROVISION_CLOUD_RUN_MLFLOW: ${{ steps.repo_config.outputs.provision_cloud_run_mlflow }}
          REPO_GCP_PROVISION_CLOUD_RUN_GRAFANA: ${{ steps.repo_config.outputs.provision_cloud_run_grafana }}
          REPO_GCP_CLOUD_RUN_GRAFANA_PROMETHEUS_URL: ${{ steps.repo_config.outputs.cloud_run_grafana_prometheus_url }}
          REPO_GCP_PROVISION_CLOUD_RUN_UI: ${{ steps.repo_config.outputs.provision_cloud_run_ui }}
          REPO_GCP_PROVISION_CLOUD_WORKFLOWS: ${{ steps.repo_config.outputs.provision_cloud_workflows }}
          REPO_GCP_PROVISION_ONLINE_COMPOSE_HOST: ${{ steps.repo_config.outputs.provision_online_compose_host }}
          REPO_GCP_ONLINE_COMPOSE_HOST_NAME: ${{ steps.repo_config.outputs.online_compose_host_name }}
          REPO_GCP_ONLINE_COMPOSE_HOST_ZONE: ${{ steps.repo_config.outputs.online_compose_host_zone }}
          REPO_GCP_ONLINE_COMPOSE_MACHINE_TYPE: ${{ steps.repo_config.outputs.online_compose_machine_type }}
          REPO_GCP_ONLINE_COMPOSE_DISK_SIZE_GB: ${{ steps.repo_config.outputs.online_compose_disk_size_gb }}
          REPO_GCP_CLOUD_RUN_SERVICE: ${{ steps.repo_config.outputs.cloud_run_service }}
        run: |
          set -euo pipefail

          normalize_bool() {
            local name="$1"
            local value="$2"

            case "$value" in
              true|false)
                printf '%s\n' "$value"
                ;;
              *)
                echo "${name} must resolve to true or false, got '${value}'." >&2
                exit 1
                ;;
            esac
          }

          normalize_non_negative_integer() {
            local name="$1"
            local value="$2"

            if [[ ! "$value" =~ ^[0-9]+$ ]]; then
              echo "${name} must resolve to a non-negative integer, got '${value}'." >&2
              exit 1
            fi

            printf '%s\n' "$value"
          }

          normalize_positive_integer() {
            local name="$1"
            local value="$2"

            value="$(normalize_non_negative_integer "$name" "$value")"
            if [[ "$value" -lt 1 ]]; then
              echo "${name} must resolve to an integer greater than zero, got '${value}'." >&2
              exit 1
            fi

            printf '%s\n' "$value"
          }

          project_id="${{ inputs.project_id }}"
          if [[ -z "$project_id" ]]; then
            project_id="$REPO_GCP_PROJECT_ID"
          fi

          if [[ -z "$project_id" ]]; then
            echo "Set project_id in the workflow input or repository variable GCP_PROJECT_ID." >&2
            exit 1
          fi

          region="${{ inputs.region }}"
          if [[ -z "$region" ]]; then
            region="$REPO_GCP_LOCATION"
          fi
          if [[ -z "$region" ]]; then
            region='europe-west6'
          fi

          artifact_bucket_name="${{ inputs.artifact_bucket_name }}"
          if [[ -z "$artifact_bucket_name" ]]; then
            artifact_bucket_name="$REPO_GCP_ARTIFACT_BUCKET_NAME"
          fi
          if [[ -z "$artifact_bucket_name" ]]; then
            artifact_bucket_name="foehncast-artifacts-${project_id}"
          fi

          state_bucket="$REPO_GCP_TERRAFORM_STATE_BUCKET"
          if [[ -z "$state_bucket" ]]; then
            state_bucket="${project_id}-foehncast-tfstate"
          fi

          state_prefix="$REPO_GCP_TERRAFORM_STATE_PREFIX"
          if [[ -z "$state_prefix" ]]; then
            state_prefix='terraform/state'
          fi

          artifact_registry_repository_id="${{ inputs.artifact_registry_repository_id }}"
          if [[ -z "$artifact_registry_repository_id" ]]; then
            artifact_registry_repository_id="$REPO_GCP_ARTIFACT_REPOSITORY"
          fi
          if [[ -z "$artifact_registry_repository_id" ]]; then
            artifact_registry_repository_id='foehncast-docker'
          fi

          bigquery_dataset_id="${{ inputs.bigquery_dataset_id }}"
          if [[ -z "$bigquery_dataset_id" ]]; then
            bigquery_dataset_id="$REPO_GCP_BIGQUERY_DATASET"
          fi
          if [[ -z "$bigquery_dataset_id" ]]; then
            bigquery_dataset_id='foehncast'
          fi

          bigquery_location="${{ inputs.bigquery_location }}"
          if [[ -z "$bigquery_location" ]]; then
            bigquery_location="$REPO_GCP_BIGQUERY_LOCATION"
          fi
          if [[ -z "$bigquery_location" ]]; then
            bigquery_location="$region"
          fi

          bigquery_feature_table_id="${{ inputs.bigquery_feature_table_id }}"
          if [[ -z "$bigquery_feature_table_id" ]]; then
            bigquery_feature_table_id="$REPO_GCP_BIGQUERY_TABLE"
          fi
          if [[ -z "$bigquery_feature_table_id" ]]; then
            bigquery_feature_table_id='forecast_features'
          fi

          feast_online_store_location="${{ inputs.feast_online_store_location }}"
          if [[ -z "$feast_online_store_location" ]]; then
            feast_online_store_location="$REPO_GCP_FEAST_ONLINE_STORE_LOCATION"
          fi
          if [[ -z "$feast_online_store_location" ]]; then
            feast_online_store_location="$region"
          fi

          feast_online_store_database_name="${{ inputs.feast_online_store_database_name }}"
          if [[ -z "$feast_online_store_database_name" ]]; then
            feast_online_store_database_name="$REPO_GCP_FEAST_ONLINE_STORE_DATABASE_NAME"
          fi
          if [[ -z "$feast_online_store_database_name" ]]; then
            feast_online_store_database_name='feast-online'
          fi

          terraform_command="${{ steps.flags.outputs.command }}"
          destroy_confirmation="${{ inputs.destroy_confirmation }}"
          cleanup_confirmation="${{ inputs.cleanup_confirmation }}"
          cleanup_clear_github_actions="${{ inputs.cleanup_clear_github_actions }}"
          cleanup_delete_state_bucket="${{ inputs.cleanup_delete_state_bucket }}"
          provision_cloud_run_service="${{ inputs.provision_cloud_run_service }}"
          if [[ -z "$provision_cloud_run_service" ]]; then
            provision_cloud_run_service="$REPO_GCP_PROVISION_CLOUD_RUN_SERVICE"
          fi
          if [[ -z "$provision_cloud_run_service" ]]; then
            provision_cloud_run_service='false'
          fi
          provision_cloud_run_service="$(normalize_bool provision_cloud_run_service "$provision_cloud_run_service")"
          mlflow_tracking_uri="${{ inputs.mlflow_tracking_uri }}"
          if [[ -z "$mlflow_tracking_uri" ]]; then
            mlflow_tracking_uri="$REPO_GCP_MLFLOW_TRACKING_URI"
          fi
          provision_cloud_composer_environment="${{ inputs.provision_cloud_composer_environment }}"
          if [[ -z "$provision_cloud_composer_environment" ]]; then
            provision_cloud_composer_environment="$REPO_GCP_PROVISION_CLOUD_COMPOSER_ENVIRONMENT"
          fi
          if [[ -z "$provision_cloud_composer_environment" ]]; then
            provision_cloud_composer_environment='false'
          fi
          provision_cloud_composer_environment="$(normalize_bool provision_cloud_composer_environment "$provision_cloud_composer_environment")"
          cloud_composer_environment_name="${{ inputs.cloud_composer_environment_name }}"
          if [[ -z "$cloud_composer_environment_name" ]]; then
            cloud_composer_environment_name="$REPO_GCP_CLOUD_COMPOSER_ENVIRONMENT_NAME"
          fi
          if [[ -z "$cloud_composer_environment_name" ]]; then
            cloud_composer_environment_name='foehncast-composer'
          fi
          cloud_run_service_name="${{ inputs.cloud_run_service_name }}"
          if [[ -z "$cloud_run_service_name" ]]; then
            cloud_run_service_name="$REPO_GCP_CLOUD_RUN_SERVICE_NAME"
          fi
          if [[ -z "$cloud_run_service_name" ]]; then
            cloud_run_service_name="$REPO_GCP_CLOUD_RUN_SERVICE"
          fi
          if [[ -z "$cloud_run_service_name" ]]; then
            cloud_run_service_name='foehncast-serve'
          fi

          cloud_run_container_port="$REPO_GCP_CLOUD_RUN_CONTAINER_PORT"
          if [[ -z "$cloud_run_container_port" ]]; then
            cloud_run_container_port='8080'
          fi
          cloud_run_container_port="$(normalize_positive_integer cloud_run_container_port "$cloud_run_container_port")"

          cloud_run_allow_unauthenticated="${{ inputs.cloud_run_allow_unauthenticated }}"
          if [[ -z "$cloud_run_allow_unauthenticated" ]]; then
            cloud_run_allow_unauthenticated="$REPO_GCP_CLOUD_RUN_ALLOW_UNAUTHENTICATED"
          fi
          if [[ -z "$cloud_run_allow_unauthenticated" ]]; then
            cloud_run_allow_unauthenticated='true'
          fi
          cloud_run_allow_unauthenticated="$(normalize_bool cloud_run_allow_unauthenticated "$cloud_run_allow_unauthenticated")"

          cloud_run_min_instance_count="$REPO_GCP_CLOUD_RUN_MIN_INSTANCE_COUNT"
          if [[ -z "$cloud_run_min_instance_count" ]]; then
            cloud_run_min_instance_count='0'
          fi
          cloud_run_min_instance_count="$(normalize_non_negative_integer cloud_run_min_instance_count "$cloud_run_min_instance_count")"

          cloud_run_max_instance_count="$REPO_GCP_CLOUD_RUN_MAX_INSTANCE_COUNT"
          if [[ -z "$cloud_run_max_instance_count" ]]; then
            cloud_run_max_instance_count='2'
          fi
          cloud_run_max_instance_count="$(normalize_non_negative_integer cloud_run_max_instance_count "$cloud_run_max_instance_count")"
          if [[ "$cloud_run_max_instance_count" -lt "$cloud_run_min_instance_count" ]]; then
            echo "cloud_run_max_instance_count must be greater than or equal to cloud_run_min_instance_count." >&2
            exit 1
          fi

          cloud_run_cpu="$REPO_GCP_CLOUD_RUN_CPU"
          if [[ -z "$cloud_run_cpu" ]]; then
            cloud_run_cpu='1'
          fi

          cloud_run_memory="$REPO_GCP_CLOUD_RUN_MEMORY"
          if [[ -z "$cloud_run_memory" ]]; then
            cloud_run_memory='512Mi'
          fi

          if [[ "$provision_cloud_run_service" == 'true' && -z "$mlflow_tracking_uri" ]]; then
            echo "Resolve mlflow_tracking_uri from the workflow input or repository variable GCP_MLFLOW_TRACKING_URI when provision_cloud_run_service is true." >&2
            exit 1
          fi
          provision_cloud_run_mlflow="$REPO_GCP_PROVISION_CLOUD_RUN_MLFLOW"
          if [[ -z "$provision_cloud_run_mlflow" ]]; then
            provision_cloud_run_mlflow='false'
          fi
          provision_cloud_run_mlflow="$(normalize_bool provision_cloud_run_mlflow "$provision_cloud_run_mlflow")"

          provision_cloud_run_grafana="$REPO_GCP_PROVISION_CLOUD_RUN_GRAFANA"
          if [[ -z "$provision_cloud_run_grafana" ]]; then
            provision_cloud_run_grafana='false'
          fi
          provision_cloud_run_grafana="$(normalize_bool provision_cloud_run_grafana "$provision_cloud_run_grafana")"

          cloud_run_grafana_prometheus_url="$REPO_GCP_CLOUD_RUN_GRAFANA_PROMETHEUS_URL"

          provision_cloud_run_ui="$REPO_GCP_PROVISION_CLOUD_RUN_UI"
          if [[ -z "$provision_cloud_run_ui" ]]; then
            provision_cloud_run_ui='false'
          fi
          provision_cloud_run_ui="$(normalize_bool provision_cloud_run_ui "$provision_cloud_run_ui")"

          provision_cloud_workflows="$REPO_GCP_PROVISION_CLOUD_WORKFLOWS"
          if [[ -z "$provision_cloud_workflows" ]]; then
            provision_cloud_workflows='false'
          fi
          provision_cloud_workflows="$(normalize_bool provision_cloud_workflows "$provision_cloud_workflows")"

          provision_online_compose_host="${{ inputs.provision_online_compose_host }}"
          if [[ -z "$provision_online_compose_host" ]]; then
            provision_online_compose_host="$REPO_GCP_PROVISION_ONLINE_COMPOSE_HOST"
          fi
          if [[ -z "$provision_online_compose_host" ]]; then
            provision_online_compose_host='false'
          fi
          provision_online_compose_host="$(normalize_bool provision_online_compose_host "$provision_online_compose_host")"
          online_compose_host_name="${{ inputs.online_compose_host_name }}"
          if [[ -z "$online_compose_host_name" ]]; then
            online_compose_host_name="$REPO_GCP_ONLINE_COMPOSE_HOST_NAME"
          fi
          if [[ -z "$online_compose_host_name" ]]; then
            online_compose_host_name='foehncast-online'
          fi
          online_compose_host_zone="${{ inputs.online_compose_host_zone }}"
          if [[ -z "$online_compose_host_zone" ]]; then
            online_compose_host_zone="$REPO_GCP_ONLINE_COMPOSE_HOST_ZONE"
          fi
          if [[ -z "$online_compose_host_zone" ]]; then
            online_compose_host_zone='europe-west6-b'
          fi
          online_compose_machine_type="${{ inputs.online_compose_machine_type }}"
          if [[ -z "$online_compose_machine_type" ]]; then
            online_compose_machine_type="$REPO_GCP_ONLINE_COMPOSE_MACHINE_TYPE"
          fi
          if [[ -z "$online_compose_machine_type" ]]; then
            online_compose_machine_type='e2-standard-4'
          fi
          online_compose_disk_size_gb="${{ inputs.online_compose_disk_size_gb }}"
          if [[ -z "$online_compose_disk_size_gb" ]]; then
            online_compose_disk_size_gb="$REPO_GCP_ONLINE_COMPOSE_DISK_SIZE_GB"
          fi
          if [[ -z "$online_compose_disk_size_gb" ]]; then
            online_compose_disk_size_gb='40'
          fi
          github_owner="${{ github.repository_owner }}"
          github_repository="${{ github.event.repository.name }}"

          {
            echo "TF_COMMAND=${terraform_command}"
            echo "TF_DESTROY_CONFIRMATION=${destroy_confirmation}"
            echo "TF_CLEANUP_CONFIRMATION=${cleanup_confirmation}"
            echo "TF_CLEANUP_CLEAR_GITHUB_ACTIONS=${cleanup_clear_github_actions}"
            echo "TF_CLEANUP_DELETE_STATE_BUCKET=${cleanup_delete_state_bucket}"
            echo "TF_VAR_project_id=${project_id}"
            echo "TF_VAR_region=${region}"
            echo "TF_VAR_artifact_bucket_name=${artifact_bucket_name}"
            echo "TF_VAR_artifact_registry_repository_id=${artifact_registry_repository_id}"
            echo "TF_VAR_bigquery_dataset_id=${bigquery_dataset_id}"
            echo "TF_VAR_bigquery_location=${bigquery_location}"
            echo "TF_VAR_bigquery_feature_table_id=${bigquery_feature_table_id}"
            echo "TF_VAR_feast_online_store_location=${feast_online_store_location}"
            echo "TF_VAR_feast_online_store_database_name=${feast_online_store_database_name}"
            echo "TF_VAR_provision_cloud_run_service=${provision_cloud_run_service}"
            echo "TF_VAR_mlflow_tracking_uri=${mlflow_tracking_uri}"
            echo "TF_VAR_cloud_run_service_name=${cloud_run_service_name}"
            echo "TF_VAR_cloud_run_container_port=${cloud_run_container_port}"
            echo "TF_VAR_cloud_run_allow_unauthenticated=${cloud_run_allow_unauthenticated}"
            echo "TF_VAR_cloud_run_min_instance_count=${cloud_run_min_instance_count}"
            echo "TF_VAR_cloud_run_max_instance_count=${cloud_run_max_instance_count}"
            echo "TF_VAR_cloud_run_cpu=${cloud_run_cpu}"
            echo "TF_VAR_cloud_run_memory=${cloud_run_memory}"
            echo "TF_VAR_provision_cloud_composer_environment=${provision_cloud_composer_environment}"
            echo "TF_VAR_cloud_composer_environment_name=${cloud_composer_environment_name}"
            echo "TF_VAR_provision_cloud_run_mlflow=${provision_cloud_run_mlflow}"
            echo "TF_VAR_provision_cloud_run_grafana=${provision_cloud_run_grafana}"
            echo "TF_VAR_cloud_run_grafana_prometheus_url=${cloud_run_grafana_prometheus_url}"
            echo "TF_VAR_provision_cloud_run_ui=${provision_cloud_run_ui}"
            echo "TF_VAR_provision_cloud_workflows=${provision_cloud_workflows}"
            echo "TF_VAR_provision_online_compose_host=${provision_online_compose_host}"
            echo "TF_VAR_online_compose_host_name=${online_compose_host_name}"
            echo "TF_VAR_online_compose_host_zone=${online_compose_host_zone}"
            echo "TF_VAR_online_compose_machine_type=${online_compose_machine_type}"
            echo "TF_VAR_online_compose_disk_size_gb=${online_compose_disk_size_gb}"
            echo "TF_VAR_github_owner=${github_owner}"
            echo "TF_VAR_github_repository=${github_repository}"
            echo "TF_STATE_BUCKET=${state_bucket}"
            echo "TF_STATE_PREFIX=${state_prefix}"
          } >> "$GITHUB_ENV"

      - name: Validate destroy confirmation
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'destroy' }}
        run: |
          set -euo pipefail

          if [[ -z "$TF_DESTROY_CONFIRMATION" ]]; then
            echo "Set destroy_confirmation to the resolved GCP project id before running remote destroy." >&2
            exit 1
          fi

          if [[ "$TF_DESTROY_CONFIRMATION" != "$TF_VAR_project_id" ]]; then
            echo "destroy_confirmation must exactly match the resolved GCP project id (${TF_VAR_project_id})." >&2
            exit 1
          fi

      - name: Validate cleanup request
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'cleanup' }}
        run: |
          set -euo pipefail

          if [[ -z "$TF_CLEANUP_CONFIRMATION" ]]; then
            echo "Set cleanup_confirmation to the resolved GCP project id before running remote cleanup." >&2
            exit 1
          fi

          if [[ "$TF_CLEANUP_CONFIRMATION" != "$TF_VAR_project_id" ]]; then
            echo "cleanup_confirmation must exactly match the resolved GCP project id (${TF_VAR_project_id})." >&2
            exit 1
          fi

          if [[ "$TF_CLEANUP_CLEAR_GITHUB_ACTIONS" != 'true' && "$TF_CLEANUP_DELETE_STATE_BUCKET" != 'true' ]]; then
            echo "Set at least one cleanup action: cleanup_clear_github_actions=true or cleanup_delete_state_bucket=true." >&2
            exit 1
          fi

      - name: Ensure Terraform state backend is ready
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command != 'cleanup' }}
        run: |
          set -euo pipefail

          if gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${TF_VAR_project_id}" >/dev/null 2>&1; then
            exit 0
          fi

          if [[ "$TF_COMMAND" == 'destroy' ]]; then
            echo "Remote state bucket gs://${TF_STATE_BUCKET} was not found. Remote destroy needs the existing backend state." >&2
            exit 1
          fi

          if [[ "$TF_COMMAND" == 'plan' || "$TF_COMMAND" == 'apply' ]]; then
            gcloud storage buckets create "gs://${TF_STATE_BUCKET}" \
              --project "${TF_VAR_project_id}" \
              --location "${TF_VAR_region}" \
              --uniform-bucket-level-access
          fi

      - name: Terraform init
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command != 'cleanup' }}
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=${TF_STATE_PREFIX}"

      - name: Terraform plan
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command != 'cleanup' }}
        run: |
          set -euo pipefail

          if [[ "$TF_COMMAND" == 'destroy' ]]; then
            terraform -chdir=terraform plan -destroy -out=tfplan
          else
            terraform -chdir=terraform plan -out=tfplan
          fi

      - name: Terraform apply chosen plan
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && (steps.flags.outputs.command == 'apply' || steps.flags.outputs.command == 'destroy') }}
        run: terraform -chdir=terraform apply -auto-approve tfplan

      - name: Remote cleanup delete state bucket
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'cleanup' && inputs.cleanup_delete_state_bucket == true }}
        run: |
          set -euo pipefail

          if ! gcloud storage buckets describe "gs://${TF_STATE_BUCKET}" --project "${TF_VAR_project_id}" >/dev/null 2>&1; then
            echo "Remote state bucket gs://${TF_STATE_BUCKET} was not found. Skipping delete."
            exit 0
          fi

          gcloud storage rm --recursive "gs://${TF_STATE_BUCKET}/**" >/dev/null 2>&1 || true
          gcloud storage buckets delete "gs://${TF_STATE_BUCKET}" --project "${TF_VAR_project_id}" --quiet

      - name: Remote cleanup clear repository variables
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'cleanup' && inputs.cleanup_clear_github_actions == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        run:
          ./scripts/configure-github-actions.sh --clear --repo "${{ github.repository
          }}"

      - name: Sync repository variables
        id: sync_repository_variables
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'apply' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/configure-github-actions.sh --repo "${{ github.repository }}"

      - name: Explain skipped repository variable sync
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'apply' && steps.sync_repository_variables.outcome == 'failure' }}
        run: |
          {
            echo "## Repository variable sync skipped"
            echo
            echo "Terraform apply succeeded, but the workflow token could not edit GitHub repository variables through the Actions variables API."
            echo "Existing repository variables remain unchanged."
            echo "If the shared contract needs a refresh, run ./scripts/configure-github-actions.sh from a maintainer shell authenticated with gh."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify hosted runtimes
        id: verify_hosted_runtimes
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'apply' }}
        run: |
          set -euo pipefail

          verify_failure=false
          online_compose_verification_status="skipped"
          cloud_run_verification_status="skipped"
          cloud_run_invocation_mode="not-provisioned"
          primary_hosted_api_target="not-provisioned"
          primary_hosted_api_verification_status="skipped"

          if [[ "${TF_VAR_provision_cloud_run_service}" != 'true' ]]; then
            echo "Hosted runtime verification requires TF_VAR_provision_cloud_run_service=true. Cloud Run is the only supported public API path in this configuration." >&2
            exit 1
          fi

          online_compose_app_url="$(terraform -chdir=terraform output -raw online_compose_app_url 2>/dev/null || true)"
          if [[ -n "$online_compose_app_url" ]]; then
            echo "Hosted runtime verification failed: online compose app URL is public (${online_compose_app_url}). Remove port 8000 from online_compose_public_ports so Cloud Run remains the only public API path." >&2
            online_compose_verification_status="failed"
            verify_failure=true
          else
            online_compose_verification_status="not-public"
            echo "Hosted online compose app URL is not publicly exposed, which matches the Cloud Run primary-path contract."
          fi

          cloud_run_service_url="$(terraform -chdir=terraform output -raw cloud_run_service_url 2>/dev/null || true)"
          if [[ -n "$cloud_run_service_url" ]]; then
            cloud_run_verification_status="passed"
            primary_hosted_api_target="cloud-run"
            cloud_run_allow_unauthenticated="$(printf '%s' "${TF_VAR_cloud_run_allow_unauthenticated}" | tr '[:upper:]' '[:lower:]')"
            health_url="${cloud_run_service_url%/}/health"
            spots_url="${cloud_run_service_url%/}/spots"
            metrics_url="${cloud_run_service_url%/}/metrics"
            curl_args=(--retry 30 --retry-all-errors --retry-delay 10 -fsS)

            if [[ "$cloud_run_allow_unauthenticated" != 'true' ]]; then
              echo "Cloud Run service requires authenticated invocation; requesting identity token..."
              cloud_run_invocation_mode="identity-token"
              identity_token="$(gcloud auth print-identity-token --audiences="$cloud_run_service_url")"
              curl_args+=(-H "Authorization: Bearer ${identity_token}")
            else
              cloud_run_invocation_mode="anonymous"
            fi

            echo "Waiting for Cloud Run health at ${health_url}..."
            if ! health_payload="$(curl "${curl_args[@]}" "$health_url")"; then
              echo "Cloud Run runtime verification failed: health endpoint did not respond." >&2
              cloud_run_verification_status="failed"
              verify_failure=true
            elif ! printf '%s' "$health_payload" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"healthy"'; then
              echo "Cloud Run runtime verification failed: expected healthy health payload." >&2
              printf '%s\n' "$health_payload" >&2
              cloud_run_verification_status="failed"
              verify_failure=true
            elif ! printf '%s' "$health_payload" | grep -Eq '"model_alias"[[:space:]]*:'; then
              echo "Cloud Run runtime verification failed: expected health payload to report model alias." >&2
              printf '%s\n' "$health_payload" >&2
              cloud_run_verification_status="failed"
              verify_failure=true
            elif ! printf '%s' "$health_payload" | grep -Eq '"model_version"[[:space:]]*:'; then
              echo "Cloud Run runtime verification failed: expected health payload to report model version." >&2
              printf '%s\n' "$health_payload" >&2
              cloud_run_verification_status="failed"
              verify_failure=true
            fi

            if [[ "$cloud_run_verification_status" == 'passed' ]]; then
              echo "Checking Cloud Run spots endpoint at ${spots_url}..."
              if ! spots_payload="$(curl "${curl_args[@]}" "$spots_url")"; then
                echo "Cloud Run runtime verification failed: spots endpoint did not respond." >&2
                cloud_run_verification_status="failed"
                verify_failure=true
              elif ! printf '%s' "$spots_payload" | grep -Eq '"id"[[:space:]]*:'; then
                echo "Cloud Run runtime verification failed: expected spots payload with ids." >&2
                printf '%s\n' "$spots_payload" >&2
                cloud_run_verification_status="failed"
                verify_failure=true
              fi
            fi

            if [[ "$cloud_run_verification_status" == 'passed' ]]; then
              echo "Checking Cloud Run metrics at ${metrics_url}..."
              if ! metrics_payload="$(curl "${curl_args[@]}" "$metrics_url")"; then
                echo "Cloud Run runtime verification failed: metrics endpoint did not respond." >&2
                cloud_run_verification_status="failed"
                verify_failure=true
              elif ! printf '%s' "$metrics_payload" | grep -Eq 'foehncast_online_compose_sync_status_file_present'; then
                echo "Cloud Run runtime verification failed: expected metrics payload." >&2
                printf '%s\n' "$metrics_payload" >&2
                cloud_run_verification_status="failed"
                verify_failure=true
              fi
            fi
          else
            echo "Cloud Run runtime verification failed: Cloud Run service URL is not available. Fix the Cloud Run configuration instead of skipping hosted runtime verification." >&2
            cloud_run_verification_status="failed"
            verify_failure=true
          fi

          if [[ "$primary_hosted_api_target" == 'cloud-run' ]]; then
            primary_hosted_api_verification_status="$cloud_run_verification_status"
          fi

          {
            echo "online_compose_verification_status=${online_compose_verification_status}"
            echo "cloud_run_verification_status=${cloud_run_verification_status}"
            echo "cloud_run_invocation_mode=${cloud_run_invocation_mode}"
            echo "primary_hosted_api_target=${primary_hosted_api_target}"
            echo "primary_hosted_api_verification_status=${primary_hosted_api_verification_status}"
          } >> "$GITHUB_OUTPUT"

          if [[ "$verify_failure" == 'true' ]]; then
            exit 1
          fi

      - name: Summarize outputs
        if: ${{ always() && steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'apply' }}
        run: |
          set -euo pipefail

          render_output() {
            local output_name="$1"
            local fallback="$2"
            local value

            value="$(terraform -chdir=terraform output -raw "$output_name" 2>/dev/null || true)"
            if [[ -n "$value" ]]; then
              printf '%s\n' "$value"
              return
            fi

            printf '%s\n' "$fallback"
          }

          feast_bigquery_dataset="$(render_output bigquery_dataset_id "${TF_VAR_bigquery_dataset_id}")"
          feast_bigquery_table="$(render_output bigquery_feature_table_id "${TF_VAR_bigquery_feature_table_id}")"
          feast_online_store_database_name="$(render_output feast_online_store_database_name "${TF_VAR_feast_online_store_database_name}")"

          {
            echo "## Terraform apply"
            echo
            echo "- Primary hosted API target: $(render_output primary_hosted_api_target not-provisioned)"
            echo "- Primary hosted API URL: $(render_output primary_hosted_api_url not-provisioned)"
            echo "- Primary hosted API verification: ${{ steps.verify_hosted_runtimes.outputs.primary_hosted_api_verification_status }}"
            echo "- Airflow URL: $(render_output online_compose_airflow_url host-local-by-default)"
            echo "- MLflow URL: $(render_output online_compose_mlflow_url host-local-by-default)"
            echo "- Cloud Run URL: $(terraform -chdir=terraform output -raw cloud_run_service_url 2>/dev/null || echo not-provisioned)"
            echo "- Cloud Run verification: ${{ steps.verify_hosted_runtimes.outputs.cloud_run_verification_status }}"
            echo "- Cloud Run invocation: ${{ steps.verify_hosted_runtimes.outputs.cloud_run_invocation_mode }}"
            echo "- Hosted VM public app surface: ${{ steps.verify_hosted_runtimes.outputs.online_compose_verification_status }}"
            echo "- Hosted Feast source: bigquery"
            echo "- Hosted Feast offline source table: ${TF_VAR_project_id}.${feast_bigquery_dataset}.${feast_bigquery_table}"
            echo "- Hosted Feast online store database: ${feast_online_store_database_name}"
            echo "- Feast follow-up: after curated BigQuery rows are available, run ./scripts/prepare-feast-cloud.sh to apply the Feast repo and materialize the hosted online store."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize destroy
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'destroy' }}
        run: |
          set -euo pipefail

          {
            echo "## Terraform destroy"
            echo
            echo "- Project: ${TF_VAR_project_id}"
            echo "- State bucket: gs://${TF_STATE_BUCKET}"
            echo "- Terraform-managed resources in the remote backend were targeted for destroy."
            echo "- GitHub repository variables and the state bucket remain for deliberate follow-up cleanup."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize cleanup
        if: ${{ steps.flags.outputs.bootstrap_ready == 'true' && steps.flags.outputs.command == 'cleanup' }}
        run: |
          set -euo pipefail

          {
            echo "## Terraform cleanup"
            echo
            echo "- Project: ${TF_VAR_project_id}"
            echo "- State bucket cleanup requested: ${TF_CLEANUP_DELETE_STATE_BUCKET}"
            echo "- GitHub variable cleanup requested: ${TF_CLEANUP_CLEAR_GITHUB_ACTIONS}"
            echo "- Cleanup runs after destroy and does not execute Terraform plan or apply."
          } >> "$GITHUB_STEP_SUMMARY"
