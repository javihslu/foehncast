name: Publish Runtime Images

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/publish-runtime-images.yml
      - containers/app/**
      - containers/airflow/**
      - containers/mlflow/**
      - containers/development_env/**
      - src/**
      - pyproject.toml
      - uv.lock
      - config.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: ${{ github.actor == github.repository_owner && github.triggering_actor == github.repository_owner }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: foehncast-app
            context: .
            dockerfile: containers/app/Dockerfile
          - image_name: foehncast-airflow
            context: .
            dockerfile: containers/airflow/Dockerfile
          - image_name: foehncast-mlflow
            context: containers/mlflow
            dockerfile: containers/mlflow/Dockerfile
          - image_name: foehncast-development-env
            context: containers/development_env
            dockerfile: containers/development_env/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize image
        run: |
          {
            echo "## Published runtime image"
            echo
            echo "- Image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}"
            echo "- Tags: ${{ steps.metadata.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
