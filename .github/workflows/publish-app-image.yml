name: Publish App Image

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/publish-app-image.yml
      - containers/app/**
      - src/**
      - pyproject.toml
      - uv.lock
      - config.yaml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ vars.GCP_PROJECT_ID != '' && vars.GCP_LOCATION != '' && vars.GCP_ARTIFACT_REPOSITORY != '' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY_HOST: ${{ vars.GCP_LOCATION }}-docker.pkg.dev
      IMAGE_NAME: foehncast-app
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker "${REGISTRY_HOST}" --quiet

      - id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize published image
        run: |
          {
            echo "## Published app image"
            echo
            echo '${{ steps.metadata.outputs.tags }}'
          } >> "$GITHUB_STEP_SUMMARY"

  skipped:
    if: ${{ !(vars.GCP_PROJECT_ID != '' && vars.GCP_LOCATION != '' && vars.GCP_ARTIFACT_REPOSITORY != '' && vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '') }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped publish
        run: |
          {
            echo "## App image publish skipped"
            echo
            echo "Set these repository variables to enable Artifact Registry publishing:"
            echo "- GCP_PROJECT_ID"
            echo "- GCP_LOCATION"
            echo "- GCP_ARTIFACT_REPOSITORY"
            echo "- GCP_WORKLOAD_IDENTITY_PROVIDER"
            echo "- GCP_SERVICE_ACCOUNT_EMAIL"
          } >> "$GITHUB_STEP_SUMMARY"
