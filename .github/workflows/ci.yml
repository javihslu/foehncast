name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose:
    if: ${{ github.actor == github.repository_owner && (github.event_name ==
      'pull_request' || github.triggering_actor == github.repository_owner) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config
      - run: docker compose -f docker-compose.yml -f docker-compose.cloud.yml config
      - run: docker compose -f docker-compose.yml build model-registry app
          airflow-webserver

  shell:
    if: ${{ github.actor == github.repository_owner && (github.event_name ==
      'pull_request' || github.triggering_actor == github.repository_owner) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/*.sh
      - run: bash scripts/teardown-gcp.sh --help >/dev/null
      - run: bash scripts/teardown-gcp.sh --plan-only >/dev/null

  terraform:
    if: ${{ github.actor == github.repository_owner && (github.event_name ==
      'pull_request' || github.triggering_actor == github.repository_owner) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform fmt -check
      - run: terraform -chdir=terraform validate

  lint:
    if: ${{ github.actor == github.repository_owner && (github.event_name ==
      'pull_request' || github.triggering_actor == github.repository_owner) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    if: ${{ github.actor == github.repository_owner && (github.event_name ==
      'pull_request' || github.triggering_actor == github.repository_owner) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - run: uv run pytest tests/ -v

  docs:
    if: ${{ github.actor == github.repository_owner && (github.event_name ==
      'pull_request' || github.triggering_actor == github.repository_owner) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --only-group docs --no-default-groups
      - run: uv run mkdocs build -f docs/mkdocs.yml --strict
