name: Deploy Docs

on:
    push:
        branches: [ main ]
        paths:
            - "docs/site/**"
            - "docs/mkdocs.yml"
            - "pyproject.toml"
            - "uv.lock"
            - ".github/workflows/docs.yml"
    workflow_dispatch:

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        if: ${{ github.actor == github.repository_owner && github.triggering_actor == github.repository_owner }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v5
            - uses: actions/configure-pages@v5
            - run: uv sync --frozen --only-group docs --no-default-groups
            - run: uv run mkdocs build -f docs/mkdocs.yml --strict
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: site/

    deploy:
        needs: build
        if: ${{ github.actor == github.repository_owner && github.triggering_actor == github.repository_owner }}
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
