# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Load GCP Repository Config
description: Load normalized GCP-related repository variables from toJson(vars)

inputs:
  repo-vars-json:
    description: JSON-encoded repository variables from toJson(vars)
    required: true

outputs:
  project_id:
    description: GCP project ID repository variable
    value: ${{ steps.repo_config.outputs.project_id }}
  location:
    description: GCP region repository variable
    value: ${{ steps.repo_config.outputs.location }}
  artifact_bucket_name:
    description: Artifact bucket repository variable
    value: ${{ steps.repo_config.outputs.artifact_bucket_name }}
  artifact_repository:
    description: Artifact Registry repository variable
    value: ${{ steps.repo_config.outputs.artifact_repository }}
  bigquery_dataset:
    description: BigQuery dataset repository variable
    value: ${{ steps.repo_config.outputs.bigquery_dataset }}
  bigquery_location:
    description: BigQuery location repository variable
    value: ${{ steps.repo_config.outputs.bigquery_location }}
  bigquery_table:
    description: BigQuery table repository variable
    value: ${{ steps.repo_config.outputs.bigquery_table }}
  feast_online_store_location:
    description: Feast online store location repository variable
    value: ${{ steps.repo_config.outputs.feast_online_store_location }}
  feast_online_store_database_name:
    description: Feast online store database name repository variable
    value: ${{ steps.repo_config.outputs.feast_online_store_database_name }}
  provision_cloud_run_service:
    description: Cloud Run provisioning repository variable
    value: ${{ steps.repo_config.outputs.provision_cloud_run_service }}
  cloud_run_service_name:
    description: Configured Cloud Run service name repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_service_name }}
  cloud_run_container_port:
    description: Configured Cloud Run container port repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_container_port }}
  cloud_run_allow_unauthenticated:
    description: Configured Cloud Run unauthenticated access repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_allow_unauthenticated }}
  cloud_run_min_instance_count:
    description: Configured Cloud Run minimum instance count repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_min_instance_count }}
  cloud_run_max_instance_count:
    description: Configured Cloud Run maximum instance count repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_max_instance_count }}
  cloud_run_cpu:
    description: Configured Cloud Run CPU limit repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_cpu }}
  cloud_run_memory:
    description: Configured Cloud Run memory limit repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_memory }}
  mlflow_tracking_uri:
    description: MLflow tracking URI repository variable
    value: ${{ steps.repo_config.outputs.mlflow_tracking_uri }}
  provision_cloud_composer_environment:
    description: Cloud Composer provisioning repository variable
    value: ${{ steps.repo_config.outputs.provision_cloud_composer_environment }}
  cloud_composer_environment_name:
    description: Configured Cloud Composer environment name repository variable
    value: ${{ steps.repo_config.outputs.cloud_composer_environment_name }}
  provision_online_compose_host:
    description: Online compose host provisioning repository variable
    value: ${{ steps.repo_config.outputs.provision_online_compose_host }}
  online_compose_host_name:
    description: Online compose host name repository variable
    value: ${{ steps.repo_config.outputs.online_compose_host_name }}
  online_compose_host_zone:
    description: Online compose host zone repository variable
    value: ${{ steps.repo_config.outputs.online_compose_host_zone }}
  online_compose_machine_type:
    description: Online compose machine type repository variable
    value: ${{ steps.repo_config.outputs.online_compose_machine_type }}
  online_compose_disk_size_gb:
    description: Online compose disk size repository variable
    value: ${{ steps.repo_config.outputs.online_compose_disk_size_gb }}
  workload_identity_provider:
    description: Workload Identity Provider repository variable
    value: ${{ steps.repo_config.outputs.workload_identity_provider }}
  service_account_email:
    description: Service account email repository variable
    value: ${{ steps.repo_config.outputs.service_account_email }}
  state_bucket:
    description: Terraform state bucket repository variable
    value: ${{ steps.repo_config.outputs.state_bucket }}
  state_prefix:
    description: Terraform state prefix repository variable
    value: ${{ steps.repo_config.outputs.state_prefix }}
  cloud_run_service:
    description: Cloud Run service repository variable
    value: ${{ steps.repo_config.outputs.cloud_run_service }}

runs:
  using: composite
  steps:
    - id: repo_config
      shell: bash
      env:
        REPO_VARS_JSON: ${{ inputs.repo-vars-json }}
      run: |
        set -euo pipefail

        read_repo_var() {
          local name="$1"
          jq -r --arg name "$name" '.[ $name ] // ""' <<<"$REPO_VARS_JSON"
        }

        {
          echo "project_id=$(read_repo_var GCP_PROJECT_ID)"
          echo "location=$(read_repo_var GCP_LOCATION)"
          echo "artifact_bucket_name=$(read_repo_var GCP_ARTIFACT_BUCKET_NAME)"
          echo "artifact_repository=$(read_repo_var GCP_ARTIFACT_REPOSITORY)"
          echo "bigquery_dataset=$(read_repo_var GCP_BIGQUERY_DATASET)"
          echo "bigquery_location=$(read_repo_var GCP_BIGQUERY_LOCATION)"
          echo "bigquery_table=$(read_repo_var GCP_BIGQUERY_TABLE)"
          echo "feast_online_store_location=$(read_repo_var GCP_FEAST_ONLINE_STORE_LOCATION)"
          echo "feast_online_store_database_name=$(read_repo_var GCP_FEAST_ONLINE_STORE_DATABASE_NAME)"
          echo "provision_cloud_run_service=$(read_repo_var GCP_PROVISION_CLOUD_RUN_SERVICE)"
          echo "cloud_run_service_name=$(read_repo_var GCP_CLOUD_RUN_SERVICE_NAME)"
          echo "cloud_run_container_port=$(read_repo_var GCP_CLOUD_RUN_CONTAINER_PORT)"
          echo "cloud_run_allow_unauthenticated=$(read_repo_var GCP_CLOUD_RUN_ALLOW_UNAUTHENTICATED)"
          echo "cloud_run_min_instance_count=$(read_repo_var GCP_CLOUD_RUN_MIN_INSTANCE_COUNT)"
          echo "cloud_run_max_instance_count=$(read_repo_var GCP_CLOUD_RUN_MAX_INSTANCE_COUNT)"
          echo "cloud_run_cpu=$(read_repo_var GCP_CLOUD_RUN_CPU)"
          echo "cloud_run_memory=$(read_repo_var GCP_CLOUD_RUN_MEMORY)"
          echo "mlflow_tracking_uri=$(read_repo_var GCP_MLFLOW_TRACKING_URI)"
          echo "provision_cloud_composer_environment=$(read_repo_var GCP_PROVISION_CLOUD_COMPOSER_ENVIRONMENT)"
          echo "cloud_composer_environment_name=$(read_repo_var GCP_CLOUD_COMPOSER_ENVIRONMENT_NAME)"
          echo "provision_online_compose_host=$(read_repo_var GCP_PROVISION_ONLINE_COMPOSE_HOST)"
          echo "online_compose_host_name=$(read_repo_var GCP_ONLINE_COMPOSE_HOST_NAME)"
          echo "online_compose_host_zone=$(read_repo_var GCP_ONLINE_COMPOSE_HOST_ZONE)"
          echo "online_compose_machine_type=$(read_repo_var GCP_ONLINE_COMPOSE_MACHINE_TYPE)"
          echo "online_compose_disk_size_gb=$(read_repo_var GCP_ONLINE_COMPOSE_DISK_SIZE_GB)"
          echo "workload_identity_provider=$(read_repo_var GCP_WORKLOAD_IDENTITY_PROVIDER)"
          echo "service_account_email=$(read_repo_var GCP_SERVICE_ACCOUNT_EMAIL)"
          echo "state_bucket=$(read_repo_var GCP_TERRAFORM_STATE_BUCKET)"
          echo "state_prefix=$(read_repo_var GCP_TERRAFORM_STATE_PREFIX)"
          echo "cloud_run_service=$(read_repo_var GCP_CLOUD_RUN_SERVICE)"
        } >> "$GITHUB_OUTPUT"
