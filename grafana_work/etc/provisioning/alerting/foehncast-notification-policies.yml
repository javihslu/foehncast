apiVersion: 1

policies:
  - orgId: 1
    receiver: foehncast-email
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 15m
    repeat_interval: 4h
    routes:
      - receiver: foehncast-email
        object_matchers:
          - [component, "=", inference-monitoring]
        group_by:
          - alertname
          - endpoint
          - severity
        group_wait: 0s
        group_interval: 15m
        repeat_interval: 4h
      - receiver: foehncast-email
        object_matchers:
          - [component, "=", feature-pipeline]
        group_by:
          - alertname
          - dataset
          - storage_backend
          - stage
          - severity
        group_wait: 0s
        group_interval: 15m
        repeat_interval: 4h
      - receiver: foehncast-email
        object_matchers:
          - [component, "=", training-pipeline]
        group_by:
          - alertname
          - dataset
          - requested_stage
          - stage
          - severity
        group_wait: 0s
        group_interval: 15m
        repeat_interval: 4h
      - receiver: foehncast-email
        object_matchers:
          - [component, "=", hosted-operator]
        group_by:
          - alertname
          - git_ref
          - compose_deploy_mode
          - severity
        group_wait: 0s
        group_interval: 15m
        repeat_interval: 4h
