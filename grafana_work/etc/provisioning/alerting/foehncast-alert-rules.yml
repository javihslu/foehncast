apiVersion: 1

groups:
  - orgId: 1
    name: foehncast-monitoring-alerts
    folder: FoehnCast Monitoring
    interval: 1m
    rules:
      - uid: foehncast_predmon_schedule_fail
        title: FoehnCast Prediction Monitoring Schedule Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: 'sum by (endpoint) (increase(foehncast_prediction_monitoring_schedule_total{result="failed"}[15m]))'
              instant: true
              intervalMs: 1000
              legendFormat: "{{endpoint}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-monitoring
        panelId: 12
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-monitoring
          __panelId__: "12"
          summary: Recent prediction-monitoring background scheduling failures detected.
        labels:
          component: inference-monitoring
          severity: warning
        isPaused: false
      - uid: foehncast_predmon_execution_fail
        title: FoehnCast Prediction Monitoring Execution Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: 'sum by (endpoint) (increase(foehncast_prediction_monitoring_execution_total{result="failed"}[15m]))'
              instant: true
              intervalMs: 1000
              legendFormat: "{{endpoint}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-monitoring
        panelId: 13
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-monitoring
          __panelId__: "13"
          summary: Recent prediction-monitoring background execution failures detected.
        labels:
          component: inference-monitoring
          severity: warning
        isPaused: false
      - uid: foehncast_predmon_stale_success
        title: FoehnCast Prediction Monitoring Stale Success
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: '((time() - max by (endpoint) (foehncast_prediction_monitoring_last_execution_timestamp_seconds{result="succeeded"})) * on (endpoint) (sum by (endpoint) (increase(foehncast_prediction_monitoring_schedule_total{result="scheduled"}[15m])) > bool 0))'
              instant: true
              intervalMs: 1000
              legendFormat: "{{endpoint}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 900
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-monitoring
        panelId: 14
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-monitoring
          __panelId__: "14"
          summary: Prediction monitoring has been active without a successful background execution for more than 15 minutes.
        labels:
          component: inference-monitoring
          severity: warning
        isPaused: false
      - uid: foehncast_feature_stage_failures
        title: FoehnCast Feature Stage Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: "max by (dataset, storage_backend, stage) (foehncast_feature_pipeline_stage_failure_count)"
              instant: true
              intervalMs: 1000
              legendFormat: "{{dataset}} / {{storage_backend}} / {{stage}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-monitoring
        panelId: 18
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-monitoring
          __panelId__: "18"
          summary: The latest feature-pipeline summary reports a failing stage.
        labels:
          component: feature-pipeline
          severity: warning
        isPaused: false
      - uid: foehncast_hosted_sync_stale
        title: FoehnCast Hosted Sync Stale
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: "time() - max by (git_ref, compose_deploy_mode) (foehncast_online_compose_sync_last_success_timestamp_seconds)"
              instant: true
              intervalMs: 1000
              legendFormat: "{{git_ref}} / {{compose_deploy_mode}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 900
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-monitoring
        panelId: 19
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-monitoring
          __panelId__: "19"
          summary: The hosted compose sync has not reported a successful refresh for more than 15 minutes.
        labels:
          component: hosted-operator
          severity: warning
        isPaused: false
