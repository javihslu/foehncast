                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-operations
        panelId: 25
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-operations
          __panelId__: "25"
          summary: The latest feature-pipeline summary reports a failing stage.
        labels:
          component: feature-pipeline
          severity: warning
        isPaused: false
      - uid: foehncast_training_stage_failures
        title: FoehnCast Training Stage Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
