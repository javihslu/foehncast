apiVersion: 1

groups:
  - orgId: 1
    name: foehncast-monitoring-alerts
    folder: FoehnCast Monitoring
    interval: 1m
    rules:
      - uid: foehncast_predmon_schedule_fail
        title: FoehnCast Prediction Monitoring Schedule Failures
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: prometheus
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              expr: 'sum by (endpoint) (increase(foehncast_prediction_monitoring_schedule_total{result="failed"}[15m]))'
              instant: true
              intervalMs: 1000
              legendFormat: "{{endpoint}}"
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 900
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: "__expr__"
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        dashboardUid: foehncast-operations
        panelId: 34
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          __dashboardUid__: foehncast-operations
          __panelId__: "34"
          summary: Recent prediction-monitoring background scheduling failures detected.
        labels:
          component: inference-monitoring
          severity: warning
        isPaused: false
      - uid: foehncast_predmon_execution_fail
