[auth]
disable_login_form = false

[auth.anonymous]
enabled = false
org_role = Viewer

[security]
allow_embedding = false

[public_dashboards]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[plugins]
public_key_retrieval_disabled = true

[metrics]
enabled = true

[dashboards]
default_home_dashboard_path = /opt/grafana/dashboards/foehncast-operations.json
