[auth]
disable_login_form = false

[auth.anonymous]
enabled = true
org_role = Viewer

[security]
allow_embedding = true

[public_dashboards]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[plugins]
public_key_retrieval_disabled = true
# Pin elasticsearch to the version bundled with the image to prevent the
# background installer from trying to auto-update (and failing because the
# plugins-bundled directory is root-owned).  See grafana/grafana#123110.
preinstall = elasticsearch@12.5.4

[metrics]
enabled = true

[dashboards]
default_home_dashboard_path = /opt/grafana/dashboards/foehncast-operations.json
