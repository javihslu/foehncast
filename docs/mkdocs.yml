site_name: FoehnCast Docs
site_url: https://javihslu.github.io/foehncast/
site_description: User guide and system overview for FoehnCast
repo_url: https://github.com/javihslu/foehncast
repo_name: javihslu/foehncast

docs_dir: site
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - assets/javascripts/mermaid.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - pymdownx.emoji:
      # yaml-language-server-disable Unresolved tag
      emoji_index:
        !!python/name:material.extensions.emoji.twemoji # yaml-language-server-disable Unresolved tag


      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Overview:
      - Overview: overview.md
      - Getting Started: getting-started.md
      - Use Case and Data: system/use-case.md
      - Repository: system/repository.md
      - Configuration and Contracts: system/configuration-and-contracts.md
      - Interfaces and Surfaces: system/interfaces-and-surfaces.md
  - Runtime and Deployment:
      - Architecture: system/architecture.md
      - Cloud Architecture: system/cloud-architecture.md
      - Local Evaluator: system/local-evaluator.md
      - Hosted Full-Stack: system/hosted-full-stack.md
      - Cloud Mapping: system/cloud-mapping.md
      - Delivery and Operator Workflow: system/delivery-and-operator-workflow.md
  - Pipelines and Modeling:
      - Feature Pipeline: system/feature-pipeline.md
      - Training Pipeline: system/training-pipeline.md
      - Inference Pipeline: system/inference-pipeline.md
      - Seasonality: system/seasonality.md
  - Operations:
      - Monitoring: system/monitoring.md
  - Evidence:
      - Grading Checklist: system/grading-checklist.md
