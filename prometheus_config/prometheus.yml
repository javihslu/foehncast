global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerting_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: foehncast_app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: app

  - job_name: statsd_exporter
    static_configs:
      - targets: ["statsd:9102"]
        labels:
          service: statsd
